<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fylo Data Storage</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">

        <!-- LEFT CARD -->
        <div class="card-left">
            <img src="images/logo.svg" alt="Fylo Logo" class="logo">

            <div class="icons">
                <div><img src="images/icon-document.svg" alt=""></div>
                <div><img src="images/icon-folder.svg" alt=""></div>
                <div><img src="images/icon-upload.svg" alt=""></div>
            </div>
        </div>

        <!-- RIGHT CARD -->
        <div class="card-right">
            <p class="text">
                You’ve used <strong>815 GB</strong> of your storage
            </p>

            <div class="progress-bar">
                <div class="progress">
                    <span class="circle"></span>
                </div>
            </div>

            <div class="range">
                <span>0 GB</span>
                <span>1000 GB</span>
            </div>

            <!-- FLOATING BOX -->
            <div class="storage-left">
                <span class="big">185</span>
                <span>GB LEFT</span>
            </div>

        </div>

    </main>

</body>

</html>
